openapi: 3.0.1
info:
  title: APIs.io Search API
  description: This is the APIs.io API Search API.
  version: V1
servers:
- url: https://ibmwu99rx3.execute-api.us-east-1.amazonaws.com/staging
paths:
  /search/apis:
    get:
      operationId: searchAPIs
      parameters:
      - name: maintainer
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: string
      - name: page
        in: query
        schema:
          type: string
      - name: search
        in: query
        schema:
          type: string
      - name: type
        in: query
        schema:
          type: string
      responses:
        200:
          description: 200 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Search'
      x-amazon-apigateway-integration:
        httpMethod: POST
        uri: arn:aws:apigateway:us-east-1:lambda:path/2015-03-31/functions/arn:aws:lambda:us-east-1:007596076917:function:m-s-apis-io-searchapis-g/invocations
        responses:
          default:
            statusCode: "200"
        requestParameters:
          integration.request.querystring.page: method.request.querystring.page
          integration.request.querystring.limit: method.request.querystring.limit
          integration.request.querystring.search: method.request.querystring.search
          integration.request.querystring.type: method.request.querystring.type
          integration.request.querystring.maintainer: method.request.querystring.maintainer
        requestTemplates:
          application/json: |-
            {
                "type" : "$input.params('type')",
                "maintainer" : "$input.params('maintainer')",
                "page" : "$input.params('page')",
                "limit" : "$input.params('limit')",
                "search" : "$input.params('search')"
            }
        passthroughBehavior: when_no_templates
        contentHandling: CONVERT_TO_TEXT
        type: aws
    post:
      operationId: addAPI
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/APIsJSON'
        required: true
      responses:
        201:
          description: 201 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIsJSON'
      security:
      - api_key: []
      x-amazon-apigateway-integration:
        httpMethod: POST
        uri: arn:aws:apigateway:us-east-1:lambda:path/2015-03-31/functions/arn:aws:lambda:us-east-1:007596076917:function:m-s-apis-io-searchapis-po/invocations
        responses:
          default:
            statusCode: "201"
        passthroughBehavior: when_no_templates
        contentHandling: CONVERT_TO_TEXT
        type: aws
      x-codegen-request-body-name: APIsJSON
  /search/maintainers:
    get:
      operationId: searchMaintainers
      parameters:
      - name: maintainer
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: string
      - name: page
        in: query
        schema:
          type: string
      responses:
        200:
          description: 200 response
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Search'
      x-amazon-apigateway-integration:
        httpMethod: POST
        uri: arn:aws:apigateway:us-east-1:lambda:path/2015-03-31/functions/arn:aws:lambda:us-east-1:007596076917:function:m-s-apis-io-searchmaintainers-g/invocations
        responses:
          default:
            statusCode: "200"
        requestParameters:
          integration.request.querystring.page: method.request.querystring.page
          integration.request.querystring.limit: method.request.querystring.limit
          integration.request.querystring.maintainer: method.request.querystring.maintainer
        requestTemplates:
          application/json: |-
            {
                "page" : "$input.params('page')",
                "limit" : "$input.params('limit')",
                "maintainer" : "$input.params('maintainer')"
            }
        passthroughBehavior: when_no_templates
        contentHandling: CONVERT_TO_TEXT
        type: aws
  /search/properties:
    get:
      operationId: searchProperties
      parameters:
      - name: limit
        in: query
        schema:
          type: string
      - name: page
        in: query
        schema:
          type: string
      - name: property
        in: query
        schema:
          type: string
      responses:
        200:
          description: 200 response
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Search'
      x-amazon-apigateway-integration:
        httpMethod: POST
        uri: arn:aws:apigateway:us-east-1:lambda:path/2015-03-31/functions/arn:aws:lambda:us-east-1:007596076917:function:m-s-apis-io-searchproperties-g/invocations
        responses:
          default:
            statusCode: "200"
        requestParameters:
          integration.request.querystring.page: method.request.querystring.page
          integration.request.querystring.limit: method.request.querystring.limit
          integration.request.querystring.property: method.request.querystring.property
        requestTemplates:
          application/json: |-
            {
                "page" : "$input.params('page')",
                "limit" : "$input.params('limit')",
                "property" : "$input.params('property')"
            }
        passthroughBehavior: when_no_templates
        contentHandling: CONVERT_TO_TEXT
        type: aws
  /search/tags:
    get:
      operationId: searchTags
      parameters:
      - name: tag
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: string
      - name: page
        in: query
        schema:
          type: string
      responses:
        200:
          description: 200 response
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Search'
      x-amazon-apigateway-integration:
        httpMethod: POST
        uri: arn:aws:apigateway:us-east-1:lambda:path/2015-03-31/functions/arn:aws:lambda:us-east-1:007596076917:function:m-s-apis-io-searchtags-g/invocations
        responses:
          default:
            statusCode: "200"
        requestParameters:
          integration.request.querystring.page: method.request.querystring.page
          integration.request.querystring.limit: method.request.querystring.limit
          integration.request.querystring.tag: method.request.querystring.tag
        requestTemplates:
          application/json: |-
            {
                "page" : "$input.params('page')",
                "limit" : "$input.params('limit')",
                "tag" : "$input.params('tag')"
            }
        passthroughBehavior: when_no_templates
        contentHandling: CONVERT_TO_TEXT
        type: aws
components:
  schemas:
    APIsJSON:
      required:
      - description
      - name
      - url
      type: object
      properties:
        name:
          minLength: 5
          type: string
          description: The name of the service described
        description:
          minLength: 5
          type: string
          description: Description of the service
        url:
          pattern: ^(http)|(https)://(.*)$
          type: string
          description: URL where the apis.json file will live
        image:
          type: string
          description: Image to represent the API
        created:
          type: string
          description: Date when the file was created
          format: date
        modified:
          type: string
          description: Date when the file was modified
          format: date
        specificationVersion:
          type: string
          description: APIs.json spec version, latest is 0.14
        apis:
          type: array
          description: All the APIs of this service
          items:
            $ref: '#/components/schemas/API'
        maintainers:
          type: array
          description: Maintainers of the apis.json file
          items:
            $ref: '#/components/schemas/Maintainer'
        tags:
          type: array
          description: Tags to describe the service
          items:
            $ref: '#/components/schemas/Tag'
        include:
          type: array
          description: Links to other apis.json definitions included in this service.
          items:
            $ref: '#/components/schemas/Include'
    Include:
      required:
      - name
      - url
      type: object
      properties:
        name:
          minLength: 1
          type: string
        url:
          pattern: ^(http)|(https)://(.*)$
          type: string
      description: Include other APIs.json fill
    Maintainer:
      required:
      - name
      type: object
      properties:
        name:
          minLength: 5
          type: string
          description: name
      additionalProperties:
        type: string
      description: The person or organization responsible for maintaining the API.
    Search:
      required:
      - data
      - links
      - meta
      type: object
      properties:
        meta:
          required:
          - limit
          - page
          - totalPages
          type: object
          properties:
            search:
              type: string
            type:
              type: string
            limit:
              type: integer
              format: int32
            page:
              type: integer
              format: int32
            totalPages:
              type: integer
              format: int32
        data:
          type: string
          description: Listing of APIs in the JSON API format.
        links:
          required:
          - self
          type: object
          properties:
            self:
              type: string
            first:
              type: string
            prev:
              type: string
            next:
              type: string
            last:
              type: string
      description: An JSON API object with metadata, data, and links.
    Property:
      required:
      - type
      - url
      type: object
      properties:
        type:
          pattern: ^(Swagger)$|^(RAML)$|^(Blueprint)$|^(WADL)$|^(WSDL)$|^(TermsOfService)$|^(InterfaceLicense)$|^(StatusPage)$|^(Pricing)$|^(Forums)$|^(AlertsTwitterHandle)$|^(X-[A-Za-z0-9\-]*)$
          type: string
        url:
          pattern: ^(http)|(https)://(.*)$
          type: string
      description: A representation of a URL
    Contact:
      required:
      - FN
      type: object
      properties:
        FN:
          minLength: 1
          type: string
        email:
          type: string
          format: email
        organizationName:
          minLength: 1
          type: string
        adr:
          type: string
        tel:
          minLength: 1
          type: string
        X-github:
          type: string
        photo:
          pattern: ^(http)|(https)://(.*)$
          type: string
        vCard:
          pattern: ^(http)|(https)://(.*)$
          type: string
        url:
          pattern: ^(http)|(https)://(.*)$
          type: string
      description: Information on contacting the API support
    API:
      required:
      - baseURL
      - contact
      - description
      - humanURL
      - image
      - name
      - properties
      type: object
      properties:
        name:
          minLength: 5
          type: string
          description: name
        description:
          minLength: 5
          type: string
          description: description of the API
        image:
          type: string
          description: URL of an image representing the API
        baseURL:
          pattern: ^(http)|(https)://(.*)$
          type: string
          description: baseURL
        humanURL:
          pattern: ^(http)|(https)://(.*)$
          type: string
          description: humanURL
        tags:
          type: array
          description: tags to describe the API
          items:
            minLength: 1
            type: string
        properties:
          type: array
          description: URLs
          items:
            $ref: '#/components/schemas/Property'
        contact:
          type: array
          description: Contact to reach if questions about API
          items:
            $ref: '#/components/schemas/Contact'
        meta:
          type: array
          items:
            $ref: '#/components/schemas/metaInformation'
      description: The description of the API
    Tag:
      type: object
      description: A consistent set of tag to apply to a description
    metaInformation:
      required:
      - key
      - value
      type: object
      properties:
        key:
          type: string
        value:
          type: string
      description: Metadata about the API
  securitySchemes:
    api_key:
      type: apiKey
      name: x-api-key
      in: header
